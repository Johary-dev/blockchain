<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Decentralized Voting DApp</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.umd.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 760px;
            margin: 40px auto;
            padding: 20px;
            background: #f6f8fb;
            color: #172b4d;
        }
        .card {
            background: #ffffff;
            border: 1px solid #dfe1e6;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 4px 14px rgba(15, 23, 42, 0.06);
        }
        h1, h2 {
            margin-top: 0;
        }
        button {
            background: #1e2761;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 18px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }
        button:disabled {
            background: #9aa5c1;
            cursor: not-allowed;
        }
        .proposal {
            border: 1px solid #e4e8f0;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        label,
        p {
            margin: 8px 0;
        }
        .proposal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .badge {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            background: #eef2ff;
            color: #3730a3;
            font-size: 0.9rem;
            font-weight: 600;
        }
        #status {
            padding: 14px;
            border-radius: 10px;
            margin-top: 16px;
            min-height: 60px;
            white-space: pre-line;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        .pending {
            background: #fff3cd;
            color: #856404;
        }
        .info-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .info-row p {
            margin: 6px 0;
        }
    </style>
</head>
<body>
    <h1>Decentralized Voting DApp</h1>

    <div class="card">
        <h2>Connexion</h2>
        <button id="btnConnect">Connecter MetaMask</button>
        <div class="info-row">
            <p><strong>Adresse :</strong> <span id="spanAddr">—</span></p>
            <p><strong>Réseau :</strong> <span id="spanNetwork">—</span></p>
        </div>
        <div class="info-row">
            <p><strong>Contrat :</strong> <span id="spanContract">A remplacer</span></p>
            <p><strong>Vote ouvert :</strong> <span id="spanVotingOpen">—</span></p>
        </div>
        <p><strong>Propositions totales :</strong> <span id="spanProposalCount">—</span></p>
        <button id="btnRefresh" disabled>Actualiser les propositions</button>
    </div>

    <div class="card">
        <h2>Liste des propositions</h2>
        <div id="proposalList">
            <p>Connectez MetaMask pour afficher les propositions et voter.</p>
        </div>
    </div>

    <div id="status" class="pending">Veuillez connecter MetaMask et indiquer l'adresse de votre contrat de vote.</div>

    <script src="app.js"></script>
</body>
</html>
